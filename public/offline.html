<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PawBand — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0d0a14;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 420px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .paw {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #e2e0e6;
    }
    p {
      color: #9ca3af;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      transition: opacity 0.2s ease;
      text-decoration: none;
    }
    .retry-btn:hover {
      opacity: 0.85;
    }
    .retry-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="paw" aria-hidden="true">🐾</span>
    <div class="logo">PawBand</div>
    <h1>Vous êtes hors ligne</h1>
    <p>
      Pas de connexion internet pour le moment.
      Vérifiez votre réseau et réessayez.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
